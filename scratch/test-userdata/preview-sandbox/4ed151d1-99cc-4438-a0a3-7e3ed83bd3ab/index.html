<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aureon Counter Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #F0F7F6;
      color: #1A2F2C;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 32px rgba(44,36,22,0.08);
      max-width: 400px; width: 100%; text-align: center;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
      color: #2A8A7C;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.8rem;
      color: #8B7E6A;
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    .counter {
      font-size: 3rem;
      font-weight: bold;
      color: #2C2416;
      margin: 1.25rem 0;
      font-variant-numeric: tabular-nums;
      transition: transform 0.15s ease;
      user-select: none;
    }
    .counter.bump { transform: scale(1.15); }
    .btn-row {
      display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      border: none; border-radius: 8px;
      padding: 0.6rem 1.5rem; cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.875rem; font-weight: 500;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-inc {
      background: #2A8A7C; color: white;
    }
    .btn-inc:hover { background: #1F6B60; }
    .btn-reset {
      background: #EDE4D8; color: #5C4A3A;
    }
    .btn-reset:hover { background: #D9CDBE; }
    .footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #EDE4D8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.7rem;
      color: #A89880;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Aureon Counter Demo</h1>
    <p class="subtitle">Self-Test Coding Agent Demo</p>
    <div class="counter" id="counter">0</div>
    <div class="btn-row">
      <button class="btn btn-inc" id="btn-increment" onclick="increment()">Increment</button>
      <button class="btn btn-reset" id="btn-reset" onclick="reset()">Reset</button>
    </div>
    <p class="footer">Generated by Aureon Desk</p>
  </div>
  <script>
    let count = 0;
    const counterEl = document.getElementById('counter');
    function increment() {
      count++;
      counterEl.textContent = count;
      counterEl.classList.add('bump');
      setTimeout(function() { counterEl.classList.remove('bump'); }, 150);
    }
    function reset() {
      count = 0;
      counterEl.textContent = count;
    }
  </script>
</body>
</html>
