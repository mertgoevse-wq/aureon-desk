<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="aureole-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A45C" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#C75B39" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8A45C" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C75B39"/>
      <stop offset="100%" stop-color="#B8683A"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer aureole ring -->
  <circle cx="128" cy="128" r="120" fill="url(#aureole-grad)" stroke="#C75B39" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Inner subtle ring -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#E8A45C" stroke-width="0.75" stroke-opacity="0.15"/>

  <!-- Abstract "A" mark - left stroke -->
  <path d="M72 178L104 72L110 72L78 178H72Z" fill="url(#mark-grad)"/>

  <!-- Abstract "A" mark - right stroke -->
  <path d="M184 178L152 72L146 72L178 178H184Z" fill="url(#mark-grad)"/>

  <!-- Crossbar -->
  <rect x="92" y="140" width="72" height="6" rx="3" fill="url(#mark-grad)"/>

  <!-- Neural node dots -->
  <circle cx="128" cy="68" r="3" fill="#E8A45C" opacity="0.7"/>
  <circle cx="128" cy="168" r="2.5" fill="#E8A45C" opacity="0.5"/>
  <circle cx="68" cy="128" r="2" fill="#E8A45C" opacity="0.4"/>
  <circle cx="188" cy="128" r="2" fill="#E8A45C" opacity="0.4"/>

  <!-- Subtle connection lines from nodes to center -->
  <line x1="128" y1="72" x2="128" y2="134" stroke="#E8A45C" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="72" y1="128" x2="86" y2="134" stroke="#E8A45C" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="184" y1="128" x2="170" y2="134" stroke="#E8A45C" stroke-width="0.5" stroke-opacity="0.1"/>
</svg>