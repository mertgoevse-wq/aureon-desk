<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#FAF8F5" />
  
  <!-- Subtle border ring -->
  <rect x="4" y="4" width="248" height="248" rx="46" stroke="#D4CBB9" stroke-width="4" />
  
  <!-- Outer aureole ring -->
  <circle cx="128" cy="120" r="96" stroke="#E5DED3" stroke-width="2" opacity="0.6" />
  <circle cx="128" cy="120" r="88" stroke="#C75B39" stroke-width="1" opacity="0.25" />
  
