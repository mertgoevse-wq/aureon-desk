    <!-- Neural lattice dots -->
    <circle cx="0" cy="22" r="1.5" fill="#E8A45C" opacity="0.7" />
    <circle cx="-8" cy="8" r="1" fill="#E8A45C" opacity="0.5" />
    <circle cx="8" cy="8" r="1" fill="#E8A45C" opacity="0.5" />
    <circle cx="-5" cy="2" r="0.8" fill="#E8A45C" opacity="0.4" />
    <circle cx="5" cy="2" r="0.8" fill="#E8A45C" opacity="0.4" />
