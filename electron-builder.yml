appId: com.aureon.desk
productName: Aureon Desk
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintrc,.prettierrc,tsconfig.*,drizzle.config.*}'
  - '!{dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{ARCHITECTURE.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: node_modules/better-sqlite3/build
    to: better-sqlite3/build
    filter:
      - '**/*'
